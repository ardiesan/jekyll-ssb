name: OCI Image Build & Publish

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  #push:
  #  # Publish semver tags as releases.
  #  tags: [ '*.*.*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. 1.2.3)'
        required: true
        type: string
      sign:
        description: "Sign the image with cosign (creates a .sig in the registry)"
        type: boolean
        required: false
        default: false

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository_owner }}/jekyll

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write       # cosign keyless signing (when sign=true) AND attest-build-provenance
      attestations: write   # required by actions/attest-build-provenance to store the signed attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: ${{ inputs.sign }}
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: 'v2.2.4'
      
      # NEW: register QEMU so the runner can build the arm64 layers under emulation.
      # Without this, `platforms: linux/arm64` fails because the amd64 runner
      # cannot execute arm64 binaries during `gem install` / native gem compiles.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: arm64
          
      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0
        with:
          buildkitd-flags: >-
            --allow-insecure-entitlement security.insecure
            --allow-insecure-entitlement network.host

      # Log into GHCR Registry.
      - name: Log into GHCR.io Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      # Log into Docker Hub Registry.
      - name: Log into Docker Hub Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract Metadata (tags, labels) for the image
      # https://github.com/docker/metadata-action
      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            docker.io/${{ env.IMAGE_NAME }}
          # Always move `latest` to this build, on every trigger.
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Manual runs: ref is a branch, not a tag, so semver won't fire —
            # use the dispatch input as the version tag instead.
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
  
      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and Push Image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          # Supply-chain attestations ON (secure defaults):
          #   - provenance mode=max  -> full SLSA build predicate
          #   - builder-id           -> identifies the exact workflow run
          #   - sbom                 -> SPDX software bill of materials
          # Trade-off: each built platform gains an `unknown/unknown` entry in the
          # registry manifest list (that row is the attestation manifest holding
          # both the provenance and SBOM layers).
          provenance: mode=max,builder-id=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitHub-managed SIGNED build provenance (Sigstore keyless via OIDC).
      # This is separate from, and in addition to, the unsigned buildx provenance
      # above. It is stored in GitHub's attestation store (repo "Attestations" tab)
      # and verifiable with:  gh attestation verify oci://<image> --owner <owner>
      # Free for public repositories. push-to-registry stores a copy as an OCI referrer.
      - name: Attest build provenance (GHCR)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
 
      - name: Attest build provenance (Docker Hub)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Sign the resulting OCI image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the Published Image
        if: ${{ inputs.sign }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
